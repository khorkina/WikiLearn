<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WikiLearn - Learn English with Wikipedia{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson.css') }}">
    

    {% block head_extra %}{% endblock %}
</head>
  
<body>

    <header class="header">
        <div class="back-nav">
            {% block back_button %}
            {% if request.path != '/' %}
            <a href="javascript:history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i><span>Back</span>
            </a>
            {% endif %}
            {% endblock %}
        </div>
            
        <div class="logo">Wiki<span>Learn</span></div>
        
        <div class="header-actions">
            <!-- Empty div for flexbox alignment -->
        </div>
    </header>
    
    <div class="wiki-search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input id="wiki-search" type="text"
               placeholder="Search Wikipedia…" autocomplete="off">
        <ul id="wiki-suggest" class="suggest-list"></ul>
        <table id="wiki-results" class="wiki-results-table"></table>
    </div>
    
    <script>
        (() => {
            const inp   = document.getElementById('wiki-search');
            const list  = document.getElementById('wiki-suggest');
            if (!inp) return;
        
            let timer;
            inp.addEventListener('input', e => {
                clearTimeout(timer);
                const q = e.target.value.trim();
                if (q.length < 2){ list.innerHTML=''; return; }
        
                timer = setTimeout(async () => {
                    // MediaWiki Opensearch (5 результатов)
                    const url = `https://en.wikipedia.org/w/api.php?action=opensearch&origin=*&limit=5&search=${encodeURIComponent(q)}`;
                    const res = await fetch(url).then(r=>r.json());
                    const titles = res[1];         // массив заголовков
                    const desc   = res[2];         // массив описаний
                    list.innerHTML = titles.map((t,i)=>
                        `<li data-title="${t}"><strong>${t}</strong> <small>${desc[i]||''}</small></li>`
                    ).join('');
                }, 300);                         // дебаунс 300 мс
            });
        
            // клик по подсказке → редирект
            list.addEventListener('click', e => {
                const li = e.target.closest('li');
                if (!li) return;
                const title = li.dataset.title;
                window.location = `/article/${encodeURIComponent(title)}`;
            });
        
            // Escape/клик вне — закрыть список
            document.addEventListener('click', e=>{
                if(!e.target.closest('.wiki-search-wrapper')) list.innerHTML='';
            });
            inp.addEventListener('keydown', e=>{
                if(e.key==='Escape') list.innerHTML='';
            });
        })();
    </script>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Ko-fi Style Help Button -->
    <button class="help-button" onclick="showHelpModal()">
        <i class="fas fa-question"></i>
    </button>

    <footer class="text-center py-3 mt-5">
        <p class="small">WikiLearn &copy; 2025 - Learn English with Wikipedia and AI</p>
    </footer>
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Common JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <!-- Database & Premium Management -->
    <script src="{{ url_for('static', filename='js/database.js') }}"></script>
    <script src="{{ url_for('static', filename='js/premium.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
    
    <!-- Ko-fi Style Help Modal -->
    <script>
    function showHelpModal() {
        const modal = document.createElement('div');
        modal.className = 'upgrade-modal help-modal';
        modal.innerHTML = `
            <div class="modal-backdrop">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2><i class="fas fa-graduation-cap" style="color: hsl(var(--accent));"></i> How to Use WikiLearn</h2>
                        <button class="close-modal"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="modal-body">
                        <div class="help-section">
                            <h3><i class="fas fa-search text-primary"></i> Explore Articles</h3>
                            <p>Browse categories or search for Wikipedia articles that interest you.</p>
                        </div>
                        <div class="help-section">
                            <h3><i class="fas fa-brain text-primary"></i> Choose Your Level</h3>
                            <p>Select Elementary, Intermediate, or Professional to get content adapted to your English level.</p>
                        </div>
                        <div class="help-section">
                            <h3><i class="fas fa-magic text-primary"></i> Generate Content</h3>
                            <p>Create AI-powered summaries and interactive lessons from any article.</p>
                        </div>
                        <div class="help-section">
                            <h3><i class="fas fa-crown text-warning"></i> Free vs Premium</h3>
                            <p>Free users get 1 summary + 1 lesson per day. Premium users get unlimited access.</p>
                        </div>
                        <div class="help-section">
                            <h3><i class="fas fa-history text-primary"></i> Track Progress</h3>
                            <p>Your reading history and generated content are saved locally in your browser.</p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="close-modal btn-primary">Got it!</button>
                    </div>
                </div>
            </div>
        `;

        document.body.appendChild(modal);
        setTimeout(() => modal.classList.add('show'), 10);

        const closeButtons = modal.querySelectorAll('.close-modal');
        closeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modal.classList.remove('show');
                setTimeout(() => modal.remove(), 300);
            });
        });

        modal.querySelector('.modal-backdrop').addEventListener('click', (e) => {
            if (e.target === modal.querySelector('.modal-backdrop')) {
                modal.classList.remove('show');
                setTimeout(() => modal.remove(), 300);
            }
        });
    }
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
